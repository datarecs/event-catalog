apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: event-catalog
  namespace: datarecs
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - events.datarecs.com
      secretName: event-catalog-tls
  rules:
    - host: events.datarecs.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: event-catalog
                port:
                  number: 80
